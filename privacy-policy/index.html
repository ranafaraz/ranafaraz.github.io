        <p>This Privacy Policy covers <strong>ranafaraz.github.io</strong> and all Android/mobile applications published by Rana Faraz Ahmed. It is suitable for use as a Google Play Store developer privacy policy URL.</p>
        <h2 style="margin-top:2rem">1. Overview</h2>
        <p>I collect as little data as possible and am transparent about what I do collect. This policy covers this portfolio website and all applications published under the developer account Rana Faraz Ahmed.</p>
        <h2 style="margin-top:2rem">2. Portfolio Website — Data Collected</h2>
        <p>The portfolio website does <strong>not</strong> set tracking cookies, fingerprint your browser, or run server-side analytics. Your theme preference (light/dark) is stored in localStorage on your device only and is never transmitted.</p>
        <p>If you send a message via the contact form, your name, email address, and message body are used solely to reply to your inquiry. This information is not sold, shared with third parties, or used for marketing.</p>
        <h2 style="margin-top:2rem">3. Third-Party Services</h2>
        <p><strong>Google Fonts</strong> — IP address and browser user-agent may be logged by Google per their privacy policy.</p>
        <p><strong>GitHub Pages</strong> — IP address and access logs per GitHub's privacy policy.</p>
        <p>No Google Analytics, Meta Pixel, or behavioural analytics tool is currently used on this site.</p>
        <h2 style="margin-top:2rem">4. Android &amp; Mobile Applications</h2>
        <p>Applications I publish may collect data relevant to their specific function. This page serves as the general umbrella Privacy Policy for all applications developed and published by Rana Faraz Ahmed where no separate app-specific policy is provided.</p>
        <ul>

        <h2 style="margin-top:2rem">5. Children's Privacy</h2>
